<svg width="100%" viewBox="0 0 1280 960" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Arquitectura actual de RedDocker</title>
  <desc>Flujos de ETL energetico, monitorizacion historica con Prometheus y prediccion de CPU con R sobre HDFS y Hive.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 700 27px "Segoe UI", Arial, sans-serif; fill: #17202a; }
      .subtitle { font: 400 14px "Segoe UI", Arial, sans-serif; fill: #5b6770; }
      .lane-title { font: 700 15px "Segoe UI", Arial, sans-serif; fill: #26343c; }
      .card-title { font: 600 15px "Segoe UI", Arial, sans-serif; fill: #17202a; }
      .card-detail { font: 400 12px "Segoe UI", Arial, sans-serif; fill: #495760; }
      .label { font: 500 12px "Segoe UI", Arial, sans-serif; fill: #485761; }
      .small { font: 400 11px "Segoe UI", Arial, sans-serif; fill: #59666f; }
      .lane { fill: #fbfcfd; stroke: #d9e1e7; stroke-width: 1.3; }
      .network { fill: #ffffff; stroke: #8794a0; stroke-width: 1.5; stroke-dasharray: 7 5; }
      .data { fill: #e9f3fc; stroke: #2d72b8; }
      .store { fill: #e7f6ee; stroke: #198754; }
      .query { fill: #f1edff; stroke: #6450c7; }
      .metrics { fill: #fff1ea; stroke: #d45d27; }
      .dash { fill: #fff6df; stroke: #b88113; }
      .compute { fill: #e9f7f7; stroke: #128080; }
      .on-demand { stroke-dasharray: 5 3; }
      .card { stroke-width: 1.3; rx: 8; }
      .etl-line { stroke: #2d72b8; }
      .metrics-line { stroke: #d45d27; }
      .predict-line { stroke: #128080; }
      .line { fill: none; stroke-width: 1.7; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 5 4; }
    </style>
  </defs>

  <rect width="1280" height="960" fill="#ffffff"/>
  <text x="42" y="44" class="title">RedDocker - arquitectura de datos, metricas y prediccion</text>
  <text x="42" y="67" class="subtitle">Servicios Docker en la red red-docker. HDFS almacena datos energeticos, historicos y resultados predictivos.</text>

  <rect x="28" y="92" width="1224" height="835" rx="16" class="network"/>
  <text x="1180" y="116" text-anchor="end" class="label">red-docker</text>

  <!-- Carril ETL -->
  <rect x="48" y="128" width="1184" height="218" rx="12" class="lane"/>
  <text x="68" y="157" class="lane-title">1. Pipeline ETL energetico</text>

  <rect x="68" y="191" width="210" height="86" class="card data"/>
  <text x="173" y="219" text-anchor="middle" class="card-title">mysql-practica</text>
  <text x="173" y="242" text-anchor="middle" class="card-detail">energiadb</text>
  <text x="173" y="261" text-anchor="middle" class="small">datos de generacion</text>

  <rect x="348" y="181" width="226" height="106" class="card data"/>
  <text x="461" y="210" text-anchor="middle" class="card-title">Nodo-principal</text>
  <text x="461" y="233" text-anchor="middle" class="card-detail">Sqoop + NameNode + YARN</text>
  <text x="461" y="253" text-anchor="middle" class="small">importacion MySQL -&gt; HDFS</text>
  <text x="461" y="270" text-anchor="middle" class="small">:9870 / :8088</text>

  <rect x="642" y="171" width="254" height="126" class="card store"/>
  <text x="769" y="199" text-anchor="middle" class="card-title">HDFS</text>
  <text x="769" y="221" text-anchor="middle" class="card-detail">/sqoop/energiadb/...</text>
  <rect x="660" y="240" width="101" height="37" class="card store"/>
  <rect x="777" y="240" width="101" height="37" class="card store"/>
  <text x="710" y="264" text-anchor="middle" class="small">datos-1</text>
  <text x="827" y="264" text-anchor="middle" class="small">datos-2</text>
  <text x="769" y="321" text-anchor="middle" class="small">replication=2</text>

  <rect x="966" y="191" width="230" height="86" class="card query"/>
  <text x="1081" y="219" text-anchor="middle" class="card-title">hive</text>
  <text x="1081" y="242" text-anchor="middle" class="card-detail">energiadb_hive</text>
  <text x="1081" y="261" text-anchor="middle" class="small">tabla externa / :10000</text>

  <path d="M278 234 H346" class="line etl-line"/>
  <text x="312" y="224" text-anchor="middle" class="label">Sqoop</text>
  <path d="M574 234 H640" class="line etl-line"/>
  <text x="607" y="224" text-anchor="middle" class="label">CSV</text>
  <path d="M896 234 H964" class="line etl-line"/>
  <text x="930" y="224" text-anchor="middle" class="label">HiveQL</text>

  <!-- Carril metricas -->
  <rect x="48" y="368" width="1184" height="270" rx="12" class="lane"/>
  <text x="68" y="397" class="lane-title">2. Monitorizacion e historico de metricas</text>

  <rect x="68" y="432" width="194" height="64" class="card metrics"/>
  <text x="165" y="458" text-anchor="middle" class="card-title">cAdvisor</text>
  <text x="165" y="478" text-anchor="middle" class="small">CPU y memoria por contenedor</text>

  <rect x="68" y="520" width="194" height="64" class="card metrics"/>
  <text x="165" y="546" text-anchor="middle" class="card-title">node-exporter</text>
  <text x="165" y="566" text-anchor="middle" class="small">metricas del sistema</text>

  <rect x="332" y="463" width="214" height="86" class="card metrics"/>
  <text x="439" y="491" text-anchor="middle" class="card-title">prometheus</text>
  <text x="439" y="514" text-anchor="middle" class="card-detail">scrape cada 1 segundo</text>
  <text x="439" y="533" text-anchor="middle" class="small">series temporales / :9090</text>

  <rect x="624" y="419" width="226" height="76" class="card dash"/>
  <text x="737" y="447" text-anchor="middle" class="card-title">grafana</text>
  <text x="737" y="470" text-anchor="middle" class="card-detail">dashboard FS_USAGE</text>
  <text x="737" y="487" text-anchor="middle" class="small">provisionado / :3000</text>

  <rect x="624" y="527" width="226" height="76" class="card compute"/>
  <text x="737" y="555" text-anchor="middle" class="card-title">metricas-exporter</text>
  <text x="737" y="578" text-anchor="middle" class="card-detail">Python / cada 5 minutos</text>
  <text x="737" y="595" text-anchor="middle" class="small">API query_range</text>

  <rect x="932" y="527" width="260" height="76" class="card store"/>
  <text x="1062" y="555" text-anchor="middle" class="card-title">HDFS historico</text>
  <text x="1062" y="578" text-anchor="middle" class="card-detail">/metricas/prometheus/</text>
  <text x="1062" y="595" text-anchor="middle" class="small">CSV consultables desde Hive</text>

  <path d="M262 464 H300 V488 H330" class="line metrics-line"/>
  <path d="M262 552 H300 V524 H330" class="line metrics-line"/>
  <path d="M546 487 H590 V457 H622" class="line metrics-line"/>
  <text x="580" y="447" text-anchor="middle" class="label">datasource</text>
  <path d="M546 525 H590 V565 H622" class="line metrics-line"/>
  <text x="580" y="585" text-anchor="middle" class="label">API</text>
  <path d="M850 565 H930" class="line metrics-line"/>
  <text x="890" y="554" text-anchor="middle" class="label">CSV</text>

  <!-- Carril prediccion -->
  <rect x="48" y="660" width="1184" height="222" rx="12" class="lane"/>
  <text x="68" y="689" class="lane-title">3. Prediccion de CPU con R (ejecucion bajo demanda)</text>

  <rect x="68" y="744" width="230" height="76" class="card store"/>
  <text x="183" y="772" text-anchor="middle" class="card-title">Historico CPU en HDFS</text>
  <text x="183" y="795" text-anchor="middle" class="card-detail">/metricas/prometheus/*.csv</text>

  <rect x="363" y="734" width="238" height="96" class="card compute on-demand"/>
  <text x="482" y="762" text-anchor="middle" class="card-title">prediccion-r</text>
  <text x="482" y="785" text-anchor="middle" class="card-detail">R / lm por contenedor</text>
  <text x="482" y="805" text-anchor="middle" class="small">15 minutos futuros</text>

  <rect x="666" y="744" width="238" height="76" class="card store"/>
  <text x="785" y="772" text-anchor="middle" class="card-title">Predicciones en HDFS</text>
  <text x="785" y="795" text-anchor="middle" class="card-detail">/metricas/predicciones_cpu/</text>

  <rect x="969" y="734" width="227" height="96" class="card query"/>
  <text x="1082" y="762" text-anchor="middle" class="card-title">Hive analitico</text>
  <text x="1082" y="785" text-anchor="middle" class="card-detail">predicciones_cpu</text>
  <text x="1082" y="805" text-anchor="middle" class="small">tendencias futuras</text>

  <path d="M298 782 H361" class="line predict-line"/>
  <text x="330" y="771" text-anchor="middle" class="label">lectura</text>
  <path d="M601 782 H664" class="line predict-line"/>
  <text x="632" y="771" text-anchor="middle" class="label">CSV</text>
  <path d="M904 782 H967" class="line predict-line"/>
  <text x="935" y="771" text-anchor="middle" class="label">tabla externa</text>

  <rect x="68" y="895" width="14" height="14" rx="3" class="data"/>
  <text x="90" y="906" class="small">ETL energetico</text>
  <rect x="219" y="895" width="14" height="14" rx="3" class="metrics"/>
  <text x="241" y="906" class="small">Observabilidad</text>
  <rect x="370" y="895" width="14" height="14" rx="3" class="store"/>
  <text x="392" y="906" class="small">Almacenamiento HDFS</text>
  <rect x="566" y="895" width="14" height="14" rx="3" class="compute"/>
  <text x="588" y="906" class="small">Proceso de datos</text>
  <rect x="735" y="895" width="14" height="14" rx="3" class="query"/>
  <text x="757" y="906" class="small">Consulta Hive</text>
</svg>
