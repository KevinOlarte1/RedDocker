services:
  Nodo-principal:
    build: ./hadoop-sqoop
    image: hadoop-con-sqoop
    container_name: Nodo-principal
    hostname: Nodo-principal
    ports:
      - "50070:9870"
      - "8088:8088"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://Nodo-principal:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_webhdfs_enabled=true
      - HDFS_CONF_dfs_permissions_enabled=false
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    volumes:
      - namenode:/hadoop/dfs/name
    networks:
      - red-docker

  mysql-practica:
    build: ./mysql
    container_name: mysql-practica
    hostname: mysql-practica
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root1234
      - MYSQL_DATABASE=example
      - MYSQL_USER=alumne
      - MYSQL_PASSWORD=alumne1234
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - red-docker

  hive:
    image: apache/hive:4.0.0
    container_name: hive
    hostname: hive
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
    networks:
      - red-docker

  datos-1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datos-1
    hostname: datos-1
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://Nodo-principal:9000
    depends_on:
      - Nodo-principal
    networks:
      - red-docker

  datos-2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datos-2
    hostname: datos-2
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://Nodo-principal:9000
    depends_on:
      - Nodo-principal
    networks:
      - red-docker

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - red-docker

  grafana:
    image: grafana/grafana
    container_name: grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - red-docker

  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    hostname: node-exporter
    ports:
      - "9100:9100"
    networks:
      - red-docker

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    hostname: cadvisor
    ports:
      - "8089:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - red-docker

networks:
  red-docker:
    name: red-docker
    driver: bridge

volumes:
  namenode:
  mysql_data:
  prometheus_data:
  grafana_data:
