global:
  scrape_interval: 10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "hadoop-namenode"
    metrics_path: /jmx
    static_configs:
      - targets: ["Nodo-principal:9870"]

  - job_name: "hadoop-resourcemanager"
    metrics_path: /jmx
    static_configs:
      - targets: ["Nodo-principal:8088"]
